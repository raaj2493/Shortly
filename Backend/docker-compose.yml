services:
  postgres:
    image: postgres:latest
    container_name: url_shortner_db
    environment:
      POSTGRES_USER=postgres
      POSTGRES_PASSWORD=postgres
      POSTGRES_DB=postgres
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  redis:
    image: redis:latest
    container_name: url_shortner_redis
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    networks:
      - app_network
  
  volumes:
  postgres_data:
  redis_data:

networks:
  app_network:
    driver: bridge
